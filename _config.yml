  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - wordpress-utils/
  - README.md
  - assets/images/discarded/
  - assets/images/portfolio/
  - assets/images/_site/
  - assets/images/.jekyll-cache/
  - assets/images/galleries/README.md
  - assets/fonts/README.md
