title: Javi Aparicio Foto
email: info@javiapariciofoto.ch
description: Portrait photographer located in Bern, Switzerland.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://javiapariciofoto.ch" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username:
github_username:
author:
  name: Javi Aparicio
  bio: Portrait photographer based in Bern, Switzerland.
  email: info@javiapariciofoto.ch
  url: https://javiapariciofoto.ch
locale: "en_US"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-multiple-languages-plugin

languages: ["en", "de", "es"]
default_lang: "en"
exclude_from_localization: ["assets"]

sass:
  style: compressed

timezone: Europe/Zurich

markdown: kramdown

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
