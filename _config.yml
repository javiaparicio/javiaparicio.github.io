email: info@javiapariciofoto.ch

locale:
  de: "de_CH"
  en: "en_CH"
  es: "es"

baseurl: ""
url: "https://javiapariciofoto.ch"

author:
  name: Javi Aparicio
  email: info@javiapariciofoto.ch
  url: https://javiapariciofoto.ch

plugins:
  - jekyll-multiple-languages-plugin

exclude_from_localizations:
  - assets
  - contact.json
  - robots.txt
  - CNAME
  - README.md
  - sitemap_index.xml
  - 60c897ba159d47ef82a9edfa68a80dc7.txt

sass:
  style: compressed

compress_html:
