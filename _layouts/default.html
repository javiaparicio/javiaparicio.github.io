<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="shortcut icon"
            href="{{ site.data.settings.basic_settings.favicon_image | relative_url }}"
        />
        <title>
            {% if page.url == "/" %} {{
            site.data.settings.basic_settings.site_title }} – {{ page.title }}
            {% else %} {{ page.title }} – {{
            site.data.settings.basic_settings.site_title }} {% endif %}
        </title>
        <link
            rel="stylesheet"
            href="{{ '/assets/css/main.css' | relative_url }}"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        />
        <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
        {% seo %}
    </head>
    <body>
        <div class="container">
            <div class="hamburger" id="hamburger">&#9776;</div>
            {% include sidebar.html %} {% include mobile-menu.html %}
            <div class="content">{{ content }}</div>
        </div>
    </body>
</html>
