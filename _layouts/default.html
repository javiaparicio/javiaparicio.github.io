<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            href="/favicon-96x96.png"
            sizes="96x96"
        />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="Javi Aparicio Foto" />
        <link rel="manifest" href="/site.webmanifest" />
        <title>
            {% if page.url == "/" %} {{
            site.data.settings.basic_settings.site_title }} – {{ page.title }}
            {% else %} {{ page.title }} – {{
            site.data.settings.basic_settings.site_title }} {% endif %}
        </title>
        <link
            rel="stylesheet"
            href="{{ '/assets/css/main.css' | relative_url }}"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        />
        <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
        {% seo %}
    </head>
    <body>
        <div class="container">
            <div class="hamburger" id="hamburger">&#9776;</div>
            {% include sidebar.html %} {% include mobile-menu.html %}
            <div class="content">{{ content }}</div>
        </div>
        {% include footer.html %}
    </body>
</html>
