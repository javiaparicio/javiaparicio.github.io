<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            href="/favicon-96x96.png"
            sizes="96x96"
        />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="Javi Aparicio Foto" />
        <title>
            {%if page.title %} {{ page.title }} {% else %} {{ site.title }}
            {%endif %}
        </title>
        <link rel="manifest" href="/site.webmanifest" />
        <link
            rel="stylesheet"
            href="{{ '/assets/css/main.css' | relative_url }}"
        />
        <script
            src="{{ '/assets/js/script.js' | relative_url }}"
            defer
        ></script>
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "LocalBusiness",
                "name": "Javi Aparicio Foto",
                "image": "https://javiapariciofoto.ch/assets/images/javiAparicioFotoLogo.webp",
                "@id": "https://javiapariciofoto.ch/",
                "url": "https://javiapariciofoto.ch/",
                "telephone": "+41 77 231 12 63",
                "address": {
                    "@type": "PostalAddress",
                    "streetAddress": "Stauffacherstrasse 44",
                    "addressLocality": "Bern",
                    "postalCode": "3014",
                    "addressCountry": "CH"
                },
                "geo": {
                    "@type": "GeoCoordinates",
                    "latitude": "46.9647184",
                    "longitude": "7.4527444"
                },
                "priceRange": "$$",
                "openingHours": "Mo-Su 17:00-21:00",
                "sameAs": [
                    "https://www.instagram.com/thereisnopossibleway/",
                    "https://www.instagram.com/javiapariciofoto/"
                ],
                "serviceArea": {
                    "@type": "Place",
                    "name": "Bern, Switzerland"
                },
                "makesOffer": [
                    {
                        "@type": "Service",
                        "name": "Portrait Photography",
                        "description": "Professional portrait photography in Bern for individuals, couples, and families."
                    },
                    {
                        "@type": "Service",
                        "name": "Event Photography",
                        "description": "High-quality event photography for corporate events, concerts, and private gatherings."
                    }
                ]
            }
        </script>
        {% seo title=false %}
    </head>
    <body>
        <div class="container">
            <div class="hamburger" id="hamburger">&#9776;</div>
            {% include sidebar.html %} {% include mobile-menu.html %}
            <div class="content">{{ content }}</div>
        </div>
        {% include footer.html %}
    </body>
</html>
