faq_pricing:
  de:
    - question: "Welche Session brauche ich?"
      answer: "Wenn Sie unsicher sind, schreiben Sie mir kurz, wofür Sie die Fotos brauchen (LinkedIn, Webseite, Team). Ich empfehle Ihnen das passende Paket — ohne Verpflichtung."
    - question: "Was kostet ein Portrait in Bern?"
      answer: "Professionelle Porträts ab 150 CHF, Personal Branding und Team-Sessions ab 350 CHF. Alle Pakete inkl. Vorbereitung, Session, Auswahl und Bearbeitung."
    - question: "Wo findet die Session statt?"
      answer: "In meinem Studio in Bern (Stauffacherstrasse 44) oder an einem Ort in der Stadt — immer nach Terminvereinbarung."
  en:
    - question: "Which session do I need?"
      answer: "If you are unsure, tell me what you need the photos for (LinkedIn, website, team). I will suggest the right package — no obligation."
    - question: "How much does a portrait session in Bern cost?"
      answer: "Professional portraits from CHF 150; personal branding and team sessions from CHF 350. All packages include preparation, the session, selection and editing."
    - question: "Where does the session take place?"
      answer: "At my studio in Bern (Stauffacherstrasse 44) or at a location in the city — always by appointment."
  es:
    - question: "¿Qué sesión necesito?"
      answer: "Si no está seguro, indíqueme para qué necesita las fotos (LinkedIn, web, equipo). Le recomiendo el paquete adecuado — sin compromiso."
    - question: "¿Cuánto cuesta un retrato en Berna?"
      answer: "Retratos profesionales desde 150 CHF; marca personal y equipos desde 350 CHF. Todos los paquetes incluyen preparación, sesión, selección y edición."
    - question: "¿Dónde se realiza la sesión?"
      answer: "En mi estudio en Berna (Stauffacherstrasse 44) o en un lugar de la ciudad — siempre con cita previa."

