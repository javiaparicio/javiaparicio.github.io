<ul class="socials">
    {% for social in site.data.settings.social_links %}
    <li class="socials_item">
        <a
            href="{{ social.url }}"
            target="_blank"
            class="socials_item_link"
            title="{{ social.name }}"
        >
            <span class="{{ social.icon }}" aria-hidden="true"></span>
        </a>
    </li>
    {% endfor %}
</ul>
