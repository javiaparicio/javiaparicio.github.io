<script type="application/json" id="jaf-lang-alternates">
{
{% assign page_ns = page.namespace | default: page.alias_of %}
{% if page_ns %}
{% for lang in site.languages %}
  {% capture tl_key %}{{ page_ns }} {{ lang }}{% endcapture %}
  {% capture alt_path %}{% tl tl_key %}{% endcapture %}
  "{{ lang }}": {{ alt_path | jsonify }}{% unless forloop.last %},{% endunless %}
{% endfor %}
{% else %}
  "de": "/",
  "en": "/en/",
  "es": "/es/"
{% endif %}
}
</script>
<script>
(function () {
  var preferred = null;

  try {
    preferred = localStorage.getItem("jaf_lang");
  } catch (e) {}

  if (preferred !== "de" && preferred !== "en" && preferred !== "es") return;

  function pathLang() {
    var p = window.location.pathname;
    if (p === "/en" || p.indexOf("/en/") === 0) return "en";
    if (p === "/es" || p.indexOf("/es/") === 0) return "es";
    return "de";
  }

  if (pathLang() === preferred) return;

  var data = document.getElementById("jaf-lang-alternates");
  if (!data) return;

  var alternates = JSON.parse(data.textContent);
  var target = alternates[preferred];
  if (!target || target === window.location.pathname) return;

  window.location.replace(target);
})();
</script>
